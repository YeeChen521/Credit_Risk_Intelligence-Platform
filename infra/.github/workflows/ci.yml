# NOTE: GitHub Actions requires this file at .github/workflows/ci.yml relative
# to the repository root. When the repo is created, symlink or copy this file:
#
#   mkdir -p .github/workflows
#   cp infra/.github/workflows/ci.yml .github/workflows/ci.yml
#   # or:
#   ln -s ../../infra/.github/workflows/ci.yml .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint ───────────────────────────────────────────────────────────────

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

  # ── Job 2: Test ───────────────────────────────────────────────────────────────

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: credit_risk_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/credit_risk_test
      REDIS_URL: redis://localhost:6379/0
      MLFLOW_TRACKING_URI: sqlite:///mlruns/mlflow.db
      API_SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests only
        run: |
          set +e
          pytest tests/unit/ -q
          code=$?
          if [ $code -eq 5 ]; then echo "No unit tests yet — skipping"; exit 0; fi
          exit $code
        # Integration tests require a running API with a real model bundle.
        # Run locally with: pytest tests/integration/
        # TODO: enable integration tests in CI once model bundle artifact
        # is stored in GitHub Actions cache or GHCR.

  # ── Job 3: Build ──────────────────────────────────────────────────────────────

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile -t credit-risk-api:ci .

      - name: Build dashboard image
        run: docker build -f Dockerfile.dashboard -t credit-risk-dashboard:ci .

  # ── Job 4: Push (placeholder) ─────────────────────────────────────────────────

  push:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Push to GHCR (not yet configured)
        run: |
          echo "TODO: uncomment the following when GitHub repo and GHCR are set up"
          # echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # docker tag credit-risk-api:ci ghcr.io/<YOUR_ORG>/<YOUR_REPO>/api:latest
          # docker tag credit-risk-dashboard:ci ghcr.io/<YOUR_ORG>/<YOUR_REPO>/dashboard:latest
          # docker push ghcr.io/<YOUR_ORG>/<YOUR_REPO>/api:latest
          # docker push ghcr.io/<YOUR_ORG>/<YOUR_REPO>/dashboard:latest
          echo "Skipping push — repo not yet configured."
