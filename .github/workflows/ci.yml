name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint ───────────────────────────────────────────────────────────────

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

  # ── Job 2: Test ───────────────────────────────────────────────────────────────

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: credit_risk_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/credit_risk_test
      REDIS_URL: redis://localhost:6379/0
      MLFLOW_TRACKING_URI: sqlite:///mlruns/mlflow.db
      API_SECRET_KEY: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests only
        run: |
          # Exit code 5 means "no tests collected" — not a failure, just an empty suite.
          pytest tests/unit/ -q; code=$?; [ $code -eq 5 ] && exit 0 || exit $code
        # Integration tests require a running API with a real model bundle.
        # Run locally with: pytest tests/integration/

  # ── Job 3: Build ──────────────────────────────────────────────────────────────

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile -t credit-risk-api:ci .

      - name: Build dashboard image
        run: docker build -f Dockerfile.dashboard -t credit-risk-dashboard:ci .

  # ── Job 4: Push to GHCR ───────────────────────────────────────────────────────

  push:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push API image
        run: |
          docker build -f Dockerfile -t ghcr.io/${{ env.OWNER }}/credit-risk-api:latest .
          docker push ghcr.io/${{ env.OWNER }}/credit-risk-api:latest

      - name: Build and push dashboard image
        run: |
          docker build -f Dockerfile.dashboard -t ghcr.io/${{ env.OWNER }}/credit-risk-dashboard:latest .
          docker push ghcr.io/${{ env.OWNER }}/credit-risk-dashboard:latest
